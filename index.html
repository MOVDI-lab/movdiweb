<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVDI · Media Kit</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0; --muted: #888; --hint: #555;
    --ig: #E1306C; --tt: #aaa; --yt: #FF0000; --tw: #9146FF;
    --fb: #1877F2; --x: #1DA1F2; --kick: #53FC18; --sp: #1DB954;
    --wa: #25D366;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 4rem; }

  #state-loading, #state-error, #state-card { display: none; width: 100%; max-width: 640px; }
  #state-loading.active, #state-error.active, #state-card.active { display: block; }

  .loading-wrap { text-align: center; padding: 6rem 0; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 1.5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap p { color: var(--muted); font-size: 14px; }

  .error-wrap { text-align: center; padding: 6rem 0; }
  .error-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .error-wrap h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .error-wrap p { color: var(--muted); font-size: 14px; line-height: 1.6; }

  .card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 16px; overflow: hidden; }
  .card-header { background: #080808; padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: #1a1a1a; border: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; color: var(--text); flex-shrink: 0; }
  .talent-name { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }
  .talent-sub { font-size: 11px; color: var(--hint); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }
  .movdi-logo { font-size: 11px; color: var(--hint); letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }

  .platforms { display: flex; flex-wrap: wrap; gap: 7px; padding: 1rem 1.5rem; border-bottom: 0.5px solid var(--border); }
  .plat-chip { display: flex; align-items: center; gap: 6px; padding: 5px 11px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--muted); }
  .plat-chip strong { color: var(--text); font-weight: 500; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .costs { padding: 1.25rem 1.5rem; }
  .section { margin-bottom: 1.25rem; }
  .section:last-child { margin-bottom: 0; }
  .section-title { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--hint); font-weight: 500; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }
  .cost-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 6px; }
  .cost-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
  .cost-label { font-size: 11px; color: var(--muted); line-height: 1.3; margin-bottom: 4px; }
  .cost-val { font-size: 15px; font-weight: 500; color: var(--text); }
  .cost-val.nota { font-size: 11px; color: var(--muted); font-weight: 400; font-style: italic; line-height: 1.4; }

  .card-footer { padding: 1rem 1.5rem; border-top: 0.5px solid var(--border); }
  .footer-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .footer-note { font-size: 11px; color: var(--hint); }
  .confidential-badge { font-size: 10px; color: var(--hint); border: 0.5px solid var(--border2); border-radius: 4px; padding: 3px 7px; letter-spacing: 0.5px; text-transform: uppercase; }

  .contact-row { display: flex; gap: 8px; }
  .btn-contact { flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; border: 0.5px solid var(--border2); transition: background .15s, border-color .15s; }
  .btn-contact svg { flex-shrink: 0; }
  .btn-wa-contact { color: var(--wa); border-color: rgba(37,211,102,0.25); background: rgba(37,211,102,0.05); }
  .btn-wa-contact:hover { background: rgba(37,211,102,0.12); border-color: var(--wa); }
  .btn-email-contact { color: var(--muted); background: var(--surface2); }
  .btn-email-contact:hover { color: var(--text); background: #2a2a2a; }

  .top-logo { font-size: 12px; color: var(--hint); letter-spacing: 3px; text-transform: uppercase; font-weight: 500; margin-bottom: 1.5rem; text-align: center; }

  @media (max-width: 500px) {
    body { padding: 1.25rem .75rem 3rem; }
    .card-header, .costs, .card-footer { padding-left: 1.25rem; padding-right: 1.25rem; }
    .platforms { padding: .875rem 1.25rem; }
    .cost-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .contact-row { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="top-logo">MOVDI</div>

<div id="state-loading" class="active">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <p>Cargando información...</p>
  </div>
</div>

<div id="state-error">
  <div class="error-wrap">
    <div class="error-icon">🔒</div>
    <h2>Link no válido</h2>
    <p>Este link no existe, fue desactivado<br>o ya expiró. Contacta a tu ejecutivo MOVDI.</p>
  </div>
</div>

<div id="state-card">
  <div class="card">
    <div class="card-header">
      <div class="header-left">
        <div class="avatar" id="av"></div>
        <div>
          <div class="talent-name" id="tn"></div>
          <div class="talent-sub">Talent MOVDI</div>
        </div>
      </div>
      <div class="movdi-logo">MOVDI</div>
    </div>
    <div class="platforms" id="pl"></div>
    <div class="costs" id="co"></div>
    <div class="card-footer">
      <div class="footer-top">
        <span class="footer-note">Precios en MXN · Uso exclusivo del destinatario</span>
        <span class="confidential-badge">Confidencial</span>
      </div>
      <div class="contact-row">
        <a class="btn-contact btn-wa-contact" href="https://wa.me/525548418158?text=Hola%2C%20vi%20la%20informaci%C3%B3n%20de%20costos%20y%20me%20gustar%C3%ADa%20saber%20m%C3%A1s." target="_blank">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Contactar por WhatsApp
        </a>
        <button class="btn-contact btn-email-contact" id="btn-email-copy" onclick="copyEmail(this)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          hola@movdi.mx
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qdxhrtptjucwtztetpum.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3JIbUTbzSbRsnAfNyJ-T2w_dWUkjAOg';

const LABELS = {
  uso_imagen_mes:'Uso de imagen / mes', pauta_mes:'Pauta (1 contenido) / mes', exclusividad_mes:'Exclusividad / mes',
  llamados_6hrs:'Llamados 6hrs', convivencias_6hrs:'Convivencias 6hrs',
  ig_story:'IG Story (15 seg)', ig_post:'IG Post', ig_reel:'Reel',
  tiktok:'TikTok', tiktok_live:'TikTok Live (1hr)', tiktok_story:'TikTok Story',
  yt_video:'Video YT dedicado', yt_mencion:'Mención YT (3-5 min)', yt_short:'YT Short', yt_live:'YT Live',
  twitch_stream:'Stream Twitch (1hr)', twitch_mencion:'Mención Twitch',
  kick_stream:'Stream Kick (1hr)', kick_mencion:'Mención Kick',
  tweet:'Tweet / X', fb_post:'FB Post', video_fb:'Video en FB',
  pinterest:'Pinterest (video)', spotify_dedicado:'Spotify dedicado', spotify_mencion:'Spotify mención'
};

const SECTIONS = {
  'Marca & derechos':['uso_imagen_mes','pauta_mes','exclusividad_mes'],
  'Activaciones':['llamados_6hrs','convivencias_6hrs'],
  'Instagram':['ig_story','ig_post','ig_reel'],
  'TikTok':['tiktok','tiktok_live','tiktok_story'],
  'YouTube':['yt_video','yt_mencion','yt_short','yt_live'],
  'Twitch':['twitch_stream','twitch_mencion'],
  'Kick':['kick_stream','kick_mencion'],
  'Otras plataformas':['tweet','fb_post','video_fb','pinterest','spotify_dedicado','spotify_mencion']
};

const PLAT = {
  instagram:{l:'Instagram',c:'var(--ig)'}, tiktok:{l:'TikTok',c:'var(--tt)'},
  youtube:{l:'YouTube',c:'var(--yt)'}, twitch:{l:'Twitch',c:'var(--tw)'},
  facebook:{l:'Facebook',c:'var(--fb)'}, x:{l:'X',c:'var(--x)'},
  kick:{l:'Kick',c:'var(--kick)'}
};

const show = id => {
  ['state-loading','state-error','state-card'].forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById(id).classList.add('active');
};

const fmt = v => typeof v === 'number' ? '$' + v.toLocaleString('es-MX') : v;
const initials = n => n.split(' ').slice(0,2).map(w=>w[0]).join('');

async function db(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function registerView(linkId) {
  await fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_views`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ link_id: linkId })
  }).catch(() => {});
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) { show('state-error'); return; }
  try {
    const links = await db(`media_kit_links?token=eq.${encodeURIComponent(token)}&activo=eq.true&select=id,expira_en,talent_id`);
    if (!links.length) { show('state-error'); return; }
    const link = links[0];
    if (link.expira_en && new Date(link.expira_en) < new Date()) { show('state-error'); return; }
    const talents = await db(`talents?id=eq.${link.talent_id}&select=name,plataformas,costos`);
    if (!talents.length) { show('state-error'); return; }
    const t = talents[0];
    registerView(link.id);
    renderCard(t);
    show('state-card');
  } catch(e) { show('state-error'); }
}

function renderCard(t) {
  document.getElementById('av').textContent = initials(t.name);
  document.getElementById('tn').textContent = t.name;

  // Update WA message with talent name
  const waBtn = document.querySelector('.btn-wa-contact');
  waBtn.href = `https://wa.me/525548418158?text=${encodeURIComponent('Hola, vi la información de costos de ' + t.name + ' y me gustaría saber más.')}`;

  document.getElementById('pl').innerHTML = Object.entries(t.plataformas).map(([k,v]) => {
    const cfg = PLAT[k]; if (!cfg) return '';
    return `<div class="plat-chip"><span class="dot" style="background:${cfg.c}"></span>${cfg.l} <strong>${v}</strong></div>`;
  }).join('');

  document.getElementById('co').innerHTML = Object.entries(SECTIONS).map(([sec, keys]) => {
    const items = keys.filter(k => t.costos[k] !== undefined && t.costos[k] !== null && t.costos[k] !== '-');
    if (!items.length) return '';
    return `<div class="section">
      <div class="section-title">${sec}</div>
      <div class="cost-grid">${items.map(k => {
        const v = t.costos[k];
        return `<div class="cost-item"><div class="cost-label">${LABELS[k]}</div><div class="cost-val ${typeof v !== 'number' ? 'nota' : ''}">${fmt(v)}</div></div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

function copyEmail(btn) {
  navigator.clipboard.writeText('hola@movdi.mx').catch(() => {
    const ta = document.createElement('textarea');
    ta.value = 'hola@movdi.mx';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
  const orig = btn.innerHTML;
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ¡Copiado!';
  setTimeout(() => { btn.innerHTML = orig; }, 2000);
}

init();
</script>
</body>
</html>
